<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Basket Club Tool — ABP</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- SheetJS pour parser les fichiers Excel -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
</head>
<body>

  <!-- ── En-tête ─────────────────────────────────────── -->
  <header>
    <div class="header-inner">
      <span class="logo">🏀</span>
      <div class="header-titles">
        <h1>Basket Club Tool</h1>
        <span class="subtitle">Amicale Basket Pecquencourt</span>
      </div>
      
      <a href="resultats.html" class="btn-icon" title="Affiche résultats">🏆</a>
      <a href="config.html" class="btn-icon" title="Équipes &amp; Divisions">📋</a>
    </div>
  </header>

  <!-- ── Contenu principal ─────────────────────────────── -->
  <main>

    <!-- Étape 1 : Fichier Excel -->
    <section class="card" id="section-upload">
      <h2>Fichier Rencontres FBI </h2>
      <div id="drop-zone" class="drop-zone">
        <span class="drop-icon">📂</span>
        <p>Glissez <strong>Fichier Excel</strong> ici</p>
        <p class="or">— ou —</p>
        <label class="btn-secondary">
          Choisir un fichier
          <input type="file" id="file-input" accept=".xlsx,.xls" hidden>
        </label>
        <p id="file-name" class="file-chosen"></p>
      </div>
    </section>

    <!-- Étape 3 : Génération -->
    <section class="card" id="section-generate">
      <h2>Générer l'affiche planning</h2>

      <!-- Sélecteur de mise en page -->
      <div class="layout-toggle" id="section-layout" role="group" aria-label="Mise en page">
        <span class="layout-label">Mise en page :</span>
        <button id="btn-layout-paysage" class="layout-btn active">🖼&nbsp; Paysage</button>
        <button id="btn-layout-portrait" class="layout-btn">📄&nbsp; Portrait</button>
      </div>

      <!-- Sélecteur de fond d'affiche -->
      <div class="bg-picker-row">
        <span class="layout-label">Fond d'affiche :</span>
        <div id="bg-picker" class="bg-picker"></div>
      </div>

      <p class="hint" id="generate-hint"></p>
      <button id="btn-generate" class="btn-primary btn-big" disabled>
        🖼&nbsp; Générer l'affiche planning
      </button>
    </section>

    <!-- Résultat -->
    <div id="result-area" class="card result-area hidden">
      <h2>✅ Affiche générée</h2>
      <img id="result-img" src="" alt="Affiche planning générée" class="result-img">
      <div class="result-actions">
        <a id="btn-download" class="btn-primary" download="affiche_planning.png">⬇&nbsp; Télécharger PNG</a>
      </div>
    </div>

    <!-- Journal -->
    <section class="card" id="section-log">
      <h2>Journal</h2>
      <div id="log" class="log" role="log" aria-live="polite"></div>
    </section>

  </main>

  <!-- ── Scripts ────────────────────────────────────────── -->
  <script src="src/transform.js"></script>
  <script src="src/local-render.js"></script>
  <script src="src/app.js"></script>

</body>
</html>
