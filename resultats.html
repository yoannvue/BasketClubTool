<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Résultats — Basket Club Tool ABP</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
</head>
<body>

  <!-- ── En-tête ─────────────────────────────────────── -->
  <header>
    <div class="header-inner">
      <span class="logo">🏀</span>
      <div class="header-titles">
        <h1>Basket Club Tool</h1>
        <span class="subtitle">Amicale Basket Pecquencourt</span>
      </div>
      <nav class="header-nav">
        <a href="index.html"   class="btn-icon" title="Planning">📅</a>
        <a href="config.html"  class="btn-icon" title="Équipes &amp; Divisions">📋</a>
      </nav>
    </div>
  </header>

  <!-- ── Contenu principal ─────────────────────────────── -->
  <main>

    <!-- Fichier Excel résultats -->
    <section class="card" id="section-upload">
      <h2>Fichier Résultats</h2>
      <div id="drop-zone" class="drop-zone">
        <span class="drop-icon">📂</span>
        <p>Glissez <strong>ResultatsDeLasemaine.xlsx</strong> ici</p>
        <p class="or">— ou —</p>
        <label class="btn-secondary">
          Choisir un fichier
          <input type="file" id="file-input" accept=".xlsx,.xls" hidden>
        </label>
        <p id="file-name" class="file-chosen"></p>
      </div>
    </section>

    <!-- Génération -->
    <section class="card" id="section-generate">
      <h2>Générer l'affiche résultats</h2>

      <!-- Sélecteur de fond -->
      <div class="bg-picker-row">
        <span class="layout-label">Fond d'affiche :</span>
        <div id="bg-picker" class="bg-picker"></div>
      </div>

      <!-- Sponsor (footer) - sélectionné automatiquement -->
      <div class="sponsor-row">
        <span class="layout-label">Sponsor (footer) :</span>
        <span id="sponsor-next-info" class="sponsor-next-info">Chargement…</span>
      </div>

      <p class="hint" id="generate-hint"></p>
      <button id="btn-generate" class="btn-primary btn-big" disabled>
        🏆&nbsp; Générer l'affiche résultats
      </button>
    </section>

    <!-- Résultat -->
    <div id="result-area" class="card result-area hidden">
      <h2>✅ Affiche générée</h2>
      <img id="result-img" src="" alt="Affiche résultats générée" class="result-img">
      <div class="result-actions">
        <a id="btn-download" class="btn-primary" download="affiche_resultats.png">⬇&nbsp; Télécharger PNG</a>
      </div>
    </div>

    <!-- Journal -->
    <section class="card" id="section-log">
      <h2>Journal</h2>
      <div id="log" class="log" role="log" aria-live="polite"></div>
    </section>

  </main>

  <!-- ── Scripts (ordre de dépendances) ────────────────── -->
  <script src="src/github-api.js"></script>
  <script src="src/transform.js"></script>
  <script src="src/local-render.js"></script>
  <script src="src/results-transform.js"></script>
  <script src="src/results-render.js"></script>
  <script src="src/results-app.js"></script>

</body>
</html>
