<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Équipes &amp; Divisions — ABP</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="config.css">
</head>
<body>

  <!-- ── En-tête ─────────────────────────────────────── -->
  <header>
    <div class="header-inner">
      <a href="index.html" class="btn-icon" title="Retour à l'accueil"
         style="text-decoration:none; font-size:20px;">←</a>
      <div class="header-titles">
        <h1>Équipes &amp; Divisions</h1>
        <span class="subtitle">Gestion de config/teams.json</span>
      </div>
    </div>
  </header>

  <main>

    <!-- Barre de sauvegarde (sticky) -->
    <div class="save-bar" id="save-bar">
      <span id="dirty-msg" class="dirty-msg hidden">● Modifications non enregistrées</span>
      <button id="btn-save" class="btn-primary btn-sm">💾&nbsp; Enregistrer</button>
    </div>

    <!-- Onglets -->
    <div class="tab-bar" role="tablist">
      <button class="tab-btn active" data-tab="divisions"
              role="tab" aria-selected="true" aria-controls="tab-divisions">
        Divisions
        <span class="tab-count" id="count-divisions"></span>
      </button>
      <button class="tab-btn" data-tab="adversaires"
              role="tab" aria-selected="false" aria-controls="tab-adversaires">
        Adversaires
        <span class="tab-count" id="count-adversaires"></span>
      </button>
    </div>

    <!-- ── Panneau Divisions ──────────────────────────── -->
    <div class="tab-panel" id="tab-divisions" role="tabpanel">
      <div class="panel-toolbar">
        <input type="text" id="search-divisions"
               class="search-input" placeholder="🔍 Rechercher…"
               autocomplete="off">
        <button class="btn-primary btn-sm" id="btn-add-division">+ Ajouter</button>
      </div>
      <div class="table-wrap">
        <table class="data-table">
          <thead>
            <tr>
              <th>Code fédéral</th>
              <th>Catégorie</th>
              <th class="col-actions"></th>
            </tr>
          </thead>
          <tbody id="tbody-divisions"></tbody>
        </table>
      </div>
    </div>

    <!-- ── Panneau Adversaires ────────────────────────── -->
    <div class="tab-panel hidden" id="tab-adversaires" role="tabpanel">
      <div class="panel-toolbar">
        <input type="text" id="search-adversaires"
               class="search-input" placeholder="🔍 Rechercher…"
               autocomplete="off">
        <button class="btn-primary btn-sm" id="btn-add-adversaire">+ Ajouter</button>
      </div>
      <div class="table-wrap">
        <table class="data-table">
          <thead>
            <tr>
              <th>Nom long (fédéral)</th>
              <th>Nom court (affiche)</th>
              <th class="col-actions"></th>
            </tr>
          </thead>
          <tbody id="tbody-adversaires"></tbody>
        </table>
      </div>
    </div>

  </main>

  <!-- Toast -->
  <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>

  <script src="config.js"></script>
</body>
</html>
