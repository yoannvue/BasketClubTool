<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Équipes &amp; Divisions — ABP</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/config.css">
</head>
<body>

  <!-- ── En-tête ─────────────────────────────────────── -->
  <header>
    <div class="header-inner">
      <a href="index.html" class="btn-icon" title="Retour à l'accueil"
         style="text-decoration:none; font-size:20px;">←</a>
      <div class="header-titles">
        <h1>Équipes &amp; Divisions</h1>
        <span class="subtitle">Gestion de config/teams.json</span>
      </div>
    </div>
  </header>

  <main>

    <!-- Barre de sauvegarde (sticky) -->
    <div class="save-bar" id="save-bar">
      <span id="dirty-msg" class="dirty-msg hidden">● Modifications non enregistrées</span>
      <button id="btn-import-reinit" class="btn-outline btn-sm" title="Réimporter depuis un fichier teams.json">📂 Importer</button>
      <button id="btn-export" class="btn-outline btn-sm" title="Télécharger teams.json">📥 Télécharger</button>
      <button id="btn-save" class="btn-primary btn-sm">💾&nbsp; Enregistrer</button>
    </div>
    <!-- Input fichier caché (déclenché par les boutons d'import) -->
    <input type="file" id="import-file-input" class="hidden" accept=".json">

    <!-- Panneau d'import initial (affiché si localStorage vide) -->
    <div id="import-panel" class="hidden">
      <div class="import-box">
        <div class="import-icon">📂</div>
        <h2>Importer teams.json</h2>
        <p>
          Ce fichier contient les divisions et adversaires du club.<br>
          Il se trouve dans le dossier <code>config/</code> du projet.
        </p>
        <button id="btn-import-file" class="btn-primary">Choisir teams.json…</button>
      </div>
    </div>

    <!-- Contenu principal (onglets + tableaux) -->
    <div id="main-content">

    <!-- Onglets -->
    <div class="tab-bar" role="tablist">
      <button class="tab-btn active" data-tab="divisions"
              role="tab" aria-selected="true" aria-controls="tab-divisions">
        Divisions
        <span class="tab-count" id="count-divisions"></span>
      </button>
      <button class="tab-btn" data-tab="adversaires"
              role="tab" aria-selected="false" aria-controls="tab-adversaires">
        Adversaires
        <span class="tab-count" id="count-adversaires"></span>
      </button>
    </div>

    <!-- ── Panneau Divisions ──────────────────────────── -->
    <div class="tab-panel" id="tab-divisions" role="tabpanel">
      <div class="panel-toolbar">
        <input type="text" id="search-divisions"
               class="search-input" placeholder="🔍 Rechercher…"
               autocomplete="off">
        <button class="btn-primary btn-sm" id="btn-add-division">+ Ajouter</button>
      </div>
      <div class="table-wrap">
        <table class="data-table">
          <thead>
            <tr>
              <th>Code fédéral</th>
              <th>Catégorie</th>
              <th>Match</th>
              <th class="col-actions"></th>
            </tr>
          </thead>
          <tbody id="tbody-divisions"></tbody>
        </table>
      </div>
    </div>

    <!-- ── Panneau Adversaires ────────────────────────── -->
    <div class="tab-panel hidden" id="tab-adversaires" role="tabpanel">
      <div class="panel-toolbar">
        <input type="text" id="search-adversaires"
               class="search-input" placeholder="🔍 Rechercher…"
               autocomplete="off">
        <button class="btn-primary btn-sm" id="btn-add-adversaire">+ Ajouter</button>
      </div>
      <div class="table-wrap">
        <table class="data-table">
          <thead>
            <tr>
              <th>Nom long (fédéral)</th>
              <th>Nom court (affiche)</th>
              <th class="col-actions"></th>
            </tr>
          </thead>
          <tbody id="tbody-adversaires"></tbody>
        </table>
      </div>
    </div>

    </div><!-- /main-content -->

  </main>

  <!-- Toast -->
  <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>

  <script src="src/config.js"></script>
</body>
</html>
