<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Équipes &amp; Divisions — ABP</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/config.css">
</head>
<body>

  <!-- ── En-tête ─────────────────────────────────────── -->
  <header>
    <div class="header-inner">
      <a href="index.html" class="btn-icon" title="Retour à l'accueil"
         style="text-decoration:none; font-size:20px;">←</a>
      <div class="header-titles">
        <h1>Équipes &amp; Divisions</h1>
        <span class="subtitle">Gestion de config/teams.json</span>
      </div>
    </div>
  </header>

  <main>

    <!-- Barre GitHub Token -->
    <div class="gh-bar" id="gh-bar">
      <span class="gh-bar-label">🔗 GitHub :</span>
      <span id="gh-status" class="gh-status" role="button" tabindex="0"></span>
      <div id="gh-token-form" class="gh-token-form">
        <input type="password" id="gh-token-input" class="input-inline gh-token-input"
               placeholder="ghp_xxxxxxxxxxxxxxxxxxxx"
               autocomplete="new-password" spellcheck="false">
        <button id="btn-gh-save-token" class="btn-outline btn-sm">✓ Enregistrer</button>
        <button id="btn-gh-clear-token" class="btn-outline btn-sm gh-btn-danger">Supprimer</button>
      </div>
    </div>


    <!-- Contenu principal (onglets + tableaux) -->
    <div id="main-content">

    <!-- Onglets -->
    <div class="tab-bar" role="tablist">
      <button class="tab-btn active" data-tab="divisions"
              role="tab" aria-selected="true" aria-controls="tab-divisions">
        Divisions
        <span class="tab-count" id="count-divisions"></span>
      </button>
      <button class="tab-btn" data-tab="adversaires"
              role="tab" aria-selected="false" aria-controls="tab-adversaires">
        Adversaires
        <span class="tab-count" id="count-adversaires"></span>
      </button>
      <button class="tab-btn" data-tab="fonds"
              role="tab" aria-selected="false" aria-controls="tab-fonds">
        🖼 Fonds
        <span class="tab-count" id="count-fonds"></span>
      </button>
      <button class="tab-btn" data-tab="sponsors"
              role="tab" aria-selected="false" aria-controls="tab-sponsors">
        🤝 Sponsors
        <span class="tab-count" id="count-sponsors"></span>
      </button>
    </div>

    <!-- ── Panneau Divisions ──────────────────────────── -->
    <div class="tab-panel" id="tab-divisions" role="tabpanel">
      <div class="panel-toolbar">
        <input type="text" id="search-divisions"
               class="search-input" placeholder="🔍 Rechercher…"
               autocomplete="off">
        <button class="btn-primary btn-sm" id="btn-add-division">+ Ajouter</button>
      </div>
      <div class="table-wrap">
        <table class="data-table">
          <thead>
            <tr>
              <th>Code fédéral</th>
              <th>Catégorie</th>
              <th>Match</th>
              <th class="col-actions"></th>
            </tr>
          </thead>
          <tbody id="tbody-divisions"></tbody>
        </table>
      </div>
    </div>

    <!-- ── Panneau Adversaires ────────────────────────── -->
    <div class="tab-panel hidden" id="tab-adversaires" role="tabpanel">
      <div class="panel-toolbar">
        <input type="text" id="search-adversaires"
               class="search-input" placeholder="🔍 Rechercher…"
               autocomplete="off">
        <button class="btn-primary btn-sm" id="btn-add-adversaire">+ Ajouter</button>
      </div>
      <div class="table-wrap">
        <table class="data-table">
          <thead>
            <tr>
              <th>Nom long (fédéral)</th>
              <th>Nom court (affiche)</th>
              <th class="col-actions"></th>
            </tr>
          </thead>
          <tbody id="tbody-adversaires"></tbody>
        </table>
      </div>
    </div>

    <!-- ── Panneau Fonds ──────────────────────────────── -->
    <div class="tab-panel hidden" id="tab-fonds" role="tabpanel">

      <!-- En-tête de section -->
      <div class="bg-mgr-header">
        <h2>Fonds disponibles <span class="tab-count" id="count-fonds-badge"></span></h2>
        <button id="btn-add-bg" class="btn-primary btn-sm" disabled
                title="Token GitHub requis pour uploader">
          + Ajouter un fond
        </button>
      </div>

      <!-- Grille des fonds -->
      <div id="bg-grid" class="bg-mgr-grid"></div>

      <!-- Panneau d'ajout -->
      <div id="bg-add-panel" class="bg-add-panel hidden">
        <div class="bg-add-form">
          <h3>Ajouter un fond</h3>
          <div class="bg-add-fields">
            <label class="bg-add-field-label">
              Image
              <input type="file" id="add-img-input" accept="image/*" class="input-inline">
            </label>
            <div id="add-img-preview" class="bg-add-preview"></div>
            <label class="bg-add-field-label">
              Nom affiché
              <input type="text" id="add-label-input" class="input-inline"
                     placeholder="ex: Terrain en fête" maxlength="40"
                     autocomplete="off" spellcheck="false">
            </label>
          </div>
          <div class="bg-add-actions">
            <button id="btn-add-confirm" class="btn-primary btn-sm">⬆&nbsp; Uploader</button>
            <button id="btn-add-cancel"  class="btn-outline btn-sm">Annuler</button>
          </div>
          <div id="add-progress" class="add-progress hidden"></div>
        </div>
      </div>

    </div>

    <!-- ── Panneau Sponsors ───────────────────────────── -->
    <div class="tab-panel hidden" id="tab-sponsors" role="tabpanel">

      <div class="bg-mgr-header">
        <h2>Sponsors disponibles <span class="tab-count" id="count-sponsors-badge"></span></h2>
        <button id="btn-add-sp" class="btn-primary btn-sm" disabled
                title="Token GitHub requis pour uploader">
          + Ajouter un sponsor
        </button>
      </div>

      <div id="sp-grid" class="bg-mgr-grid"></div>

      <div id="sp-add-panel" class="bg-add-panel hidden">
        <div class="bg-add-form">
          <h3>Ajouter un sponsor</h3>
          <div class="bg-add-fields">
            <label class="bg-add-field-label">
              Image
              <input type="file" id="sp-img-input" accept="image/*" class="input-inline">
            </label>
            <div id="sp-img-preview" class="bg-add-preview"></div>
            <label class="bg-add-field-label">
              Nom affiché
              <input type="text" id="sp-label-input" class="input-inline"
                     placeholder="ex: Sopem" maxlength="40"
                     autocomplete="off" spellcheck="false">
            </label>
          </div>
          <div class="bg-add-actions">
            <button id="btn-sp-add-confirm" class="btn-primary btn-sm">⬆&nbsp; Uploader</button>
            <button id="btn-sp-add-cancel"  class="btn-outline btn-sm">Annuler</button>
          </div>
          <div id="sp-add-progress" class="add-progress hidden"></div>
        </div>
      </div>

    </div>

    </div><!-- /main-content -->

  </main>

  <!-- Toast -->
  <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>

  <script src="src/github-api.js"></script>
  <script src="src/config.js"></script>
  <script src="src/fonds.js"></script>
  <script src="src/sponsors.js"></script>
</body>
</html>
